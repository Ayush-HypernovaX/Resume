<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Experience | Ayush Pasekar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; }
        .bento-card { background-color: #121212; border: 1px solid #1f1f1f; border-radius: 1.5rem; padding: 2rem; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500">Work Experience Manager</h1>
            <a href="index.html" class="text-gray-500 hover:text-white transition">← Back to Portfolio</a>
        </div>

        <div class="bento-card mb-8">
            <h2 class="text-xl font-semibold mb-4">Add Work Experience</h2>
            <form id="expForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="company" placeholder="Company Name" class="bg-black border border-gray-800 p-3 rounded-xl outline-none focus:border-blue-500" required>
                <input type="text" id="role" placeholder="Your Role (e.g. Intern)" class="bg-black border border-gray-800 p-3 rounded-xl outline-none focus:border-blue-500" required>
                <input type="text" id="duration" placeholder="Duration (e.g. Jan 2024 - Present)" class="bg-black border border-gray-800 p-3 rounded-xl outline-none focus:border-blue-500">
                <input type="file" id="media" class="text-sm py-2">
                <textarea id="expDescription" placeholder="What did you do there?" class="md:col-span-2 bg-black border border-gray-800 p-3 rounded-xl h-24 outline-none focus:border-blue-500"></textarea>
                <button type="submit" class="md:col-span-2 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">Add Experience</button>
            </form>
        </div>

        <div id="experienceList" class="space-y-6"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/experience';

        async function loadExperience() {
            const res = await fetch(API_URL);
            const data = await res.json();
            const list = document.getElementById('experienceList');
            list.innerHTML = data.map(exp => `
                <div class="bento-card flex flex-col md:flex-row justify-between items-start gap-4">
                    <div class="flex-1">
                        <h3 class="text-xl font-bold text-blue-400">${exp.role}</h3>
                        <p class="text-gray-300 font-semibold">${exp.company_name} | <span class="text-gray-500 text-sm">${exp.duration}</span></p>
                        <p class="text-gray-400 mt-3 text-sm leading-relaxed">${exp.description}</p>
                    </div>
                    <button onclick="deleteExp(${exp.id})" class="text-red-500 text-xs hover:underline">Delete</button>
                </div>
            `).join('');
        }

        document.getElementById('expForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('company', document.getElementById('company').value);
            formData.append('role', document.getElementById('role').value);
            formData.append('duration', document.getElementById('duration').value);
            formData.append('description', document.getElementById('expDescription').value);
            if(document.getElementById('media').files[0]) formData.append('media', document.getElementById('media').files[0]);

            await fetch(API_URL, { method: 'POST', body: formData });
            e.target.reset();
            loadExperience();
        };

        async function deleteExp(id) {
            if(confirm('Remove this experience?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadExperience();
            }
        }
        loadExperience();
    </script>
</body>
</html>
