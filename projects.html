<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Projects | Ayush Pasekar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; }
        .bento-card { background-color: #121212; border: 1px solid #1f1f1f; border-radius: 1.5rem; padding: 2rem; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500">Project Manager</h1>
            <a href="index.html" class="text-gray-500 hover:text-white transition">← Back to Portfolio</a>
        </div>

        <div class="bento-card mb-8">
            <h2 class="text-xl font-semibold mb-4">Add New Project Link</h2>
            <form id="projectForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="title" placeholder="Project Title" class="bg-black border border-gray-800 p-3 rounded-xl focus:border-blue-500 outline-none" required>
                <input type="url" id="link" placeholder="Project Link (GitHub/Live)" class="bg-black border border-gray-800 p-3 rounded-xl focus:border-blue-500 outline-none" required>
                <textarea id="description" placeholder="Short Description" class="md:col-span-2 bg-black border border-gray-800 p-3 rounded-xl focus:border-blue-500 outline-none h-24" required></textarea>
                <button type="submit" class="md:col-span-2 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">Add Project</button>
            </form>
        </div>

        <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/projects';

        // Function to fetch and display projects
        async function loadProjects() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
        const grid = document.getElementById('projectGrid');
        
                // This clears the grid and rebuilds it with data from MySQL
                grid.innerHTML = data.map(proj => `
                    <div class="bento-card border-l-4 border-blue-500 flex flex-col justify-between">
                        <div>
                            <h3 class="text-xl font-bold mb-2">${proj.title}</h3>
                            <p class="text-gray-400 text-sm mb-4 leading-relaxed">${proj.description}</p>
                        </div>
                        <div class="flex justify-between items-center mt-4">
                            <a href="${proj.link}" target="_blank" class="text-blue-500 font-bold text-xs uppercase hover:underline">
                                Open Project →
                            </a>
                            <button onclick="deleteProject(${proj.id})" class="text-red-500 text-xs opacity-50 hover:opacity-100 transition">
                                Delete
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Failed to load projects:", err);
            }
        }

        // Call this function when the page loads
        loadProjects();
    </script>
</body>
</html>
